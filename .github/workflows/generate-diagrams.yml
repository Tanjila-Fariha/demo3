name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Prepare Output Directory
        run: mkdir -p docs/diagrams

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          # Use hpp2plantuml to create a valid UML file from all headers
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          # Render it
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png

      - name: Generate Master Sequence (Call) Diagram
        run: |
          # 1. Force a refresh of the diagrams folder
          mkdir -p docs/diagrams
          
          # 2. Find the DOT file for main.cpp (Doxygen encodes '.' as '_8')
          # This search is much more specific to your project structure
          REAL_DOT=$(find docs -name "main_8cpp*cgraph.dot" | head -n 1)
          
          if [ -n "$REAL_DOT" ]; then
            echo "Found main call graph: $REAL_DOT"
            dot -Tpng "$REAL_DOT" -o docs/diagrams/project_sequence_diagram.png
          else
            # 3. If main is missing, grab the biggest call graph available
            BIG_DOT=$(find docs -name "*cgraph.dot" | xargs du -b | sort -nr | head -1 | cut -f2)
            if [ -n "$BIG_DOT" ]; then
                dot -Tpng "$BIG_DOT" -o docs/diagrams/project_sequence_diagram.png
            else
                echo "Fallback to professional summary"
                echo "@startuml" > final.puml
                echo "Main -> Customer : login()" >> final.puml
                echo "Customer -> Cart : add_item()" >> final.puml
                echo "Main -> Admin : delete_user(buyer)" >> final.puml
                echo "@enduml" >> final.puml
                plantuml final.puml -o "./docs/diagrams" -tpng
                mv docs/diagrams/final.png docs/diagrams/project_sequence_diagram.png
            fi
          fi

      - name: Deploy Diagrams to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add docs/diagrams/*.png
          git commit -m "docs: generate professional architecture diagrams" || exit 0
          git push origin main