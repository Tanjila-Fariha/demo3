name: Generate Sequence Diagrams (clang-uml)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '**.cpp'
      - '**.cc'
      - '**.cxx'
      - '**.hpp'
      - '**.h'
      - '**/CMakeLists.txt'

concurrency:
  group: diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-diagrams:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Install tools ──────────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo add-apt-repository -y ppa:bkryza/clang-uml
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-uml \
            cmake \
            ninja-build \
            default-jre-headless \
            graphviz \
            python3
          echo "clang-uml: $(clang-uml --version 2>&1 | head -1)"
          echo "cmake:     $(cmake --version | head -1)"
          echo "java:      $(java -version 2>&1 | head -1)"

      # ── 3. Download PlantUML ──────────────────────────────────────────────────
      - name: Download PlantUML
        run: |
          curl -sSL \
            https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar \
            -o /usr/local/bin/plantuml.jar
          echo "PlantUML downloaded"

      # ── 4. CMake configure ────────────────────────────────────────────────────
      # Generates build/compile_commands.json — the file clang-uml needs to
      # understand every source file, include path and compiler flag.
      - name: Configure CMake → compile_commands.json
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

          # ── DIAGNOSTIC: verify compile_commands.json was created ─────────────
          if [ ! -f build/compile_commands.json ]; then
            echo ""
            echo "================================================================"
            echo "ERROR: build/compile_commands.json was NOT created."
            echo "Fix: add this line to your CMakeLists.txt:"
            echo "     set(CMAKE_EXPORT_COMPILE_COMMANDS ON)"
            echo "================================================================"
            exit 1
          fi

          ENTRY_COUNT=$(python3 -c \
            "import json; print(len(json.load(open('build/compile_commands.json'))))")

          if [ "$ENTRY_COUNT" -eq 0 ]; then
            echo ""
            echo "================================================================"
            echo "ERROR: compile_commands.json exists but is empty."
            echo "No source files were found by CMake."
            echo "Check that your CMakeLists.txt finds your .cpp files."
            echo "================================================================"
            exit 1
          fi

          echo ""
          echo "================================================================"
          echo "compile_commands.json: $ENTRY_COUNT source file(s) found"
          echo "Files registered:"
          python3 -c "
          import json
          for e in json.load(open('build/compile_commands.json')):
              print('  ', e['file'])
          "
          echo "================================================================"

      # ── 5. Discover all methods ───────────────────────────────────────────────
      # Reads compile_commands.json to find source files, detects namespaces
      # by scanning source code, probes clang-uml for all callable methods,
      # and writes one YAML config per method.
      - name: Discover methods → write per-method configs
        run: |
          mkdir -p docs/diagrams/puml .clang-uml-generated

          python3 .github/scripts/discover_and_generate.py \
            --build-dir build \
            --out-dir   docs/diagrams/puml \
            --cfg-dir   .clang-uml-generated

          # ── DIAGNOSTIC ───────────────────────────────────────────────────────
          if [ ! -f .clang-uml-generated/manifest.json ]; then
            echo "ERROR: manifest.json not created — discovery script failed."
            exit 1
          fi

          METHOD_COUNT=$(python3 -c \
            "import json; print(len(json.load(open('.clang-uml-generated/manifest.json'))))")
          echo "methods_found=$METHOD_COUNT" >> $GITHUB_ENV

          echo ""
          echo "================================================================"
          echo "Methods discovered: $METHOD_COUNT"

          if [ "$METHOD_COUNT" -eq 0 ]; then
            echo ""
            echo "ERROR: No methods found. Showing probe config for debugging:"
            echo "----------------------------------------------------------------"
            cat .clang-uml-generated/_probe_.yaml
            echo "----------------------------------------------------------------"
            echo ""
            echo "Common causes:"
            echo "  1. All code is in the global namespace (no 'namespace X {}' blocks)"
            echo "     Fix: the script will still include global functions if this is the case"
            echo "  2. clang-uml --print-from produced no output"
            echo "     Fix: check that your code compiles without errors"
            echo "  3. compile_commands.json paths don't match actual source locations"
            echo "================================================================"
            exit 1
          fi

          echo ""
          echo "Methods to be diagrammed (first 30):"
          python3 -c "
          import json, pathlib
          cfgs = json.load(open('.clang-uml-generated/manifest.json'))
          for c in cfgs[:30]:
              print('  ', pathlib.Path(c).stem)
          if len(cfgs) > 30:
              print(f'  ... and {len(cfgs) - 30} more')
          "
          echo "================================================================"

      # ── 6. Run clang-uml — one .puml per method ───────────────────────────────
      - name: Run clang-uml → .puml files
        run: |
          MANIFEST=".clang-uml-generated/manifest.json"
          OK=0
          SKIP=0
          FIRST_ERROR=""

          while IFS= read -r CFG; do
            [ -z "$CFG" ] && continue
            NAME=$(basename "$CFG" .yaml)

            # Capture output — print stderr only on failure
            OUTPUT=$(clang-uml --config "$CFG" --no-metadata 2>&1)
            if [ $? -eq 0 ]; then
              OK=$((OK + 1))
            else
              SKIP=$((SKIP + 1))
              # Save the very first error message for diagnostics
              if [ -z "$FIRST_ERROR" ]; then
                FIRST_ERROR="$NAME: $(echo "$OUTPUT" | head -5)"
              fi
            fi
          done < <(python3 -c \
            "import json; [print(p) for p in json.load(open('$MANIFEST'))]")

          PUML=$(find docs/diagrams/puml -name "*.puml" 2>/dev/null | wc -l)

          echo ""
          echo "================================================================"
          echo "clang-uml results:"
          echo "  OK:      $OK"
          echo "  Skipped: $SKIP"
          echo "  .puml files generated: $PUML"

          if [ -n "$FIRST_ERROR" ]; then
            echo ""
            echo "First error encountered:"
            echo "  $FIRST_ERROR"
          fi

          if [ "$PUML" -eq 0 ]; then
            echo ""
            echo "ERROR: 0 .puml files were generated."
            echo "Possible causes:"
            echo "  1. C++ standard mismatch — verify CMAKE_CXX_STANDARD matches your code"
            echo "  2. Missing system headers — try adding 'apt-get install libstdc++-11-dev'"
            echo "  3. Methods have no outgoing calls — nothing to draw a sequence for"
            echo "================================================================"
            exit 1
          fi
          echo "================================================================"
          echo "puml_count=$PUML" >> $GITHUB_ENV

      # ── 7. Render .puml → SVG + PNG ───────────────────────────────────────────
      - name: Render diagrams → SVG + PNG
        run: |
          mkdir -p docs/diagrams/svg docs/diagrams/png

          find docs/diagrams/puml -name "*.puml" | while read -r PUML; do
            BASE=$(basename "$PUML" .puml)
            java -jar /usr/local/bin/plantuml.jar \
              -tsvg -o "$(pwd)/docs/diagrams/svg" "$PUML" 2>/dev/null \
              || echo "[WARN] SVG failed: $BASE"
            java -jar /usr/local/bin/plantuml.jar \
              -tpng -o "$(pwd)/docs/diagrams/png" "$PUML" 2>/dev/null \
              || echo "[WARN] PNG failed: $BASE"
          done

          SVG=$(find docs/diagrams/svg -name "*.svg" | wc -l)
          PNG=$(find docs/diagrams/png -name "*.png" | wc -l)

          echo ""
          echo "================================================================"
          echo "Rendered: $SVG SVG · $PNG PNG"
          echo "================================================================"

      # ── 8. Generate searchable HTML index ────────────────────────────────────
      - name: Generate HTML index
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path
          import html as hl

          svg_dir  = Path("docs/diagrams/svg")
          out_path = Path("docs/diagrams/index.html")
          svgs     = sorted(svg_dir.glob("*.svg"))
          if not svgs:
              print("No SVGs — skipping index"); exit(0)

          cards = ""
          for svg in svgs:
              raw  = re.sub(r"_\d{4}$", "", svg.stem)
              name = raw.removeprefix("seq_")
              name = hl.escape(name.replace("__", "::").replace("_", " "))
              cards += f"""
              <div class="card" data-name="{name.lower()}">
                <h3>{name}</h3>
                <a href="svg/{svg.name}" target="_blank">
                  <img src="svg/{svg.name}" alt="{name}" loading="lazy"/>
                </a>
                <div class="links">
                  <a href="svg/{svg.name}">SVG</a>
                  <a href="png/{svg.stem}.png">PNG</a>
                  <a href="puml/{svg.stem}.puml">Source</a>
                </div>
              </div>"""

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Sequence Diagrams ({len(svgs)})</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0}}
              body{{font-family:system-ui,sans-serif;background:#f0f2f5;padding:2rem;color:#222}}
              header{{margin-bottom:1.5rem}}
              h1{{font-size:1.4rem;color:#1a1a2e}}
              .meta{{color:#888;font-size:.85rem;margin-top:.25rem}}
              input{{width:100%;padding:.55rem .85rem;font-size:.9rem;
                     border:1px solid #ccc;border-radius:7px;margin-bottom:1.5rem;outline:none}}
              input:focus{{border-color:#0070f3;box-shadow:0 0 0 3px rgba(0,112,243,.15)}}
              .grid{{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:1.25rem}}
              .card{{background:#fff;border-radius:10px;padding:1.1rem;
                     box-shadow:0 1px 6px rgba(0,0,0,.09);transition:box-shadow .15s}}
              .card:hover{{box-shadow:0 4px 14px rgba(0,0,0,.13)}}
              .card h3{{font-size:.72rem;font-family:monospace;text-transform:uppercase;
                        letter-spacing:.07em;color:#aaa;margin-bottom:.6rem}}
              .card img{{width:100%;border:1px solid #eee;border-radius:5px;cursor:zoom-in}}
              .links{{margin-top:.5rem;display:flex;gap:.75rem}}
              .links a{{font-size:.78rem;color:#0070f3;text-decoration:none}}
              .links a:hover{{text-decoration:underline}}
              .hidden{{display:none!important}}
            </style>
          </head>
          <body>
            <header>
              <h1>&#128202; Sequence Diagrams</h1>
              <p class="meta">Auto-generated from C++ via clang-uml + PlantUML &mdash;
                {len(svgs)} diagram(s) &mdash; updated on every push.</p>
            </header>
            <input type="search" placeholder="Filter by method name…"
                   oninput="document.querySelectorAll('.card').forEach(
                     c=>c.classList.toggle('hidden',
                       this.value&&!c.dataset.name.includes(this.value.toLowerCase())))"/>
            <div class="grid">{cards}
            </div>
          </body>
          </html>"""

          out_path.write_text(page, encoding="utf-8")
          print(f"Index written: {out_path}  ({len(svgs)} diagram(s))")
          PYEOF

      # ── 9. Commit diagrams back to the branch ────────────────────────────────
      - name: Commit and push diagrams
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add docs/diagrams/
          if git diff --staged --quiet; then
            echo "No diagram changes — nothing to commit."
          else
            N=$(git diff --staged --name-only | wc -l)
            git commit -m "docs: auto-regenerate sequence diagrams ($N files) [skip ci]"
            git push
            echo "Pushed $N file(s)."
          fi

      # ── 10. Always upload artifact ────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sequence-diagrams-${{ github.sha }}
          path: docs/diagrams/
          retention-days: 30