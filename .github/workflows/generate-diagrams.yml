name: Generate C++ Sequence Diagrams

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  build-sequence-diagrams:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang \
            cmake \
            plantuml \
            graphviz \
            libyaml-cpp-dev \
            libcurl4-openssl-dev \
            libedit-dev

      # install clang-uml
      - name: Install clang-uml
        run: |
          git clone https://github.com/bkryza/clang-uml.git
          cd clang-uml
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)
          sudo make install

      # generate compilation database
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          cmake ..

      # generate sequence diagrams
      - name: Generate UML diagrams
        run: |
          clang-uml

      # render diagrams
      - name: Render diagrams
        run: |
          find diagrams -name "*.puml" -exec plantuml -tsvg {} \;

      # upload diagrams as artifacts
      - name: Upload diagrams
        uses: actions/upload-artifact@v4
        with:
          name: sequence-diagrams
          path: diagrams