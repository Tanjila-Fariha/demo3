name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          mkdir -p docs/diagrams
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png || true

      - name: Generate Master Sequence Diagram
        run: |
          mkdir -p docs/diagrams
          # We create a REAL Sequence Diagram based on your main.cpp logic
          echo "@startuml" > sequence.puml
          echo "skinparam Style strictuml" >> sequence.puml
          echo "actor User" >> sequence.puml
          echo "participant Main" >> sequence.puml
          echo "participant Admin" >> sequence.puml
          echo "participant Customer" >> sequence.puml
          echo "participant Cart" >> sequence.puml
          
          echo "User -> Main : Execute" >> sequence.puml
          echo "Main -> Customer : login()" >> sequence.puml
          echo "Main -> Customer : getCart()" >> sequence.puml
          echo "Customer -> Cart : add_item()" >> sequence.puml
          echo "Main -> Customer : place_order()" >> sequence.puml
          echo "Main -> Admin : login()" >> sequence.puml
          echo "Main -> Admin : delete_user(buyer)" >> sequence.puml
          echo "@enduml" >> sequence.puml
          
          plantuml sequence.puml -tpng
          mv sequence.png docs/diagrams/project_sequence_diagram.png

      - name: Deploy Diagrams
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/*.png
          git commit -m "docs: sync architecture diagrams" || exit 0
          git pull origin main --rebase
          git push origin main