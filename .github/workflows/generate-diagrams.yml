name: Generate Function Sequence Diagrams

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  diagrams:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y clang cmake plantuml graphviz

    - name: Install clang-uml
      run: |
        git clone https://github.com/bkryza/clang-uml.git
        cd clang-uml
        mkdir build
        cd build
        cmake ..
        make
        sudo make install

    - name: Configure project
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Generate sequence diagrams
      run: clang-uml

    - name: Render diagrams
      run: |
        find diagrams -name "*.puml" -exec plantuml -tsvg {} \;

    - name: Upload diagrams
      uses: actions/upload-artifact@v4
      with:
        name: function-sequence-diagrams
        path: diagrams